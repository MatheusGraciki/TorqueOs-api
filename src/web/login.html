<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Oficina</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        margin: 0;
      }
      form {
        background: #fff;
        padding: 24px;
        border-radius: 8px;
        width: 320px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      input, button {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        box-sizing: border-box;
      }
      button { cursor: pointer; }
      #erro { color: #b00020; margin-top: 8px; min-height: 20px; }
    </style>
  </head>
  <body>
    <form id="form-login">
      <h2>Entrar</h2>
      <input id="email" type="email" placeholder="Email" required />
      <input id="senha" type="password" placeholder="Senha" required />
      <button type="submit">Login</button>
      <div id="erro"></div>
    </form>

    <script>
      const form = document.getElementById("form-login");
      const erro = document.getElementById("erro");

      function formatRetryAfter(seconds) {
        const totalSeconds = Math.max(0, Number(seconds) || 0);
        const minutes = Math.floor(totalSeconds / 60);
        const remainingSeconds = totalSeconds % 60;

        if (minutes > 0 && remainingSeconds > 0) {
          return `${minutes}m ${remainingSeconds}s`;
        }

        if (minutes > 0) {
          return `${minutes}m`;
        }

        return `${remainingSeconds}s`;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        erro.textContent = "";

        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;

        const resposta = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ email, senha }),
        });

        if (!resposta.ok) {
          let payload = null;

          try {
            payload = await resposta.json();
          } catch {
            payload = null;
          }

          if (resposta.status === 429) {
            const waitTime = formatRetryAfter(payload?.retryAfterSeconds);
            erro.textContent = `Muitas tentativas. Tente novamente em ${waitTime}.`;
            return;
          }

          erro.textContent = payload?.error || "Email ou senha inválidos.";
          return;
        }

        window.location.href = "/";
      });
    </script>
  </body>
</html>
